name: 📊 AFG Daily Market Intelligence

on:
  # Lunes a viernes a las 07:00 UTC (09:00 España / 03:00 EST)
  schedule:
    - cron: '0 7 * * 1-5'

  # Permite lanzarlo manualmente desde la pestaña "Actions" de GitHub
  workflow_dispatch:

permissions:
  contents: write   # Necesario para hacer git push del index.html generado

jobs:
  generate-report:
    name: Generate & Deploy Report
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: pip install anthropic requests psycopg2-binary

      # 4. Ejecutar el script de análisis
      - name: Generate daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY:    ${{ secrets.TAVILY_API_KEY }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python scripts/generate_report.py

      # 5. Hacer commit y push del HTML generado
      - name: Commit updated report
        run: |
          git config --local user.email "afg-bot@alcortagroup.com"
          git config --local user.name  "AFG Intelligence Bot"
          git add public/index.html
          # Solo hace commit si hay cambios
          git diff --staged --quiet || git commit -m "📊 Daily report $(date +'%Y-%m-%d')"
          git push
