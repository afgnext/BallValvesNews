name: 📊 AFG Daily Market Intelligence

on:
  # 7:00 AM hora España (CET = UTC+1)  → 06:00 UTC
  # En verano (CEST = UTC+2) serán las 08:00h — ajustable
  schedule:
    - cron: '0 6 * * 1-5'

  # Lanzamiento manual desde GitHub → Actions → Run workflow
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    name: Generate · Store · Deploy · Notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests psycopg2-binary

      - name: Generate daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY:    ${{ secrets.TAVILY_API_KEY }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          REPORT_URL:        ${{ secrets.REPORT_URL }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_report.py

      - name: Commit & push updated report
        run: |
          git config --local user.email "afg-bot@alcortagroup.com"
          git config --local user.name  "AFG Intelligence Bot"
          git add index.html data.json
          git diff --staged --quiet || git commit -m "📊 Daily report $(date +'%Y-%m-%d %H:%M')"
          git push
